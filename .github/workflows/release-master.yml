name: Release Workflow

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the "main" branch
  push:
    tags:
      - '**'

# In Workflow B's YAML
  workflow_run:
    workflows: ["Build Main Workflow"]
    types:
      - completed

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:

  pre-release:
    name: "Pre Release"
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v4

      # Runs a set of commands using the runners shell
      - name: Install z88dk and Assemble Code
        run: |
          sudo snap install z88dk --beta
          sudo snap alias z88dk.z88dk-z80asm z88dk-z80asm
          make

      - name: Create Package Archive
        run: |
          tar cvf TRS-80-${{github.run_number}}-ROM-Images.tar *.txt *.bin

      - name: Create Release
        env:
          GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}
          TAG: ${{github.ref_name}}
        run: |
          gh release create "release${{github.run_number}}" *.tar *.txt \
            --draft \
            --title="Release ${{github.run_number}}" \
            --generate-notes
